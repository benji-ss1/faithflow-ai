<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Present Flow</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
  }
  .logo { font-size: 22px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.5px; }
  .logo span { color: #ff7a2c; }
  .spinner {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: #ff7a2c;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { margin-top: 18px; font-size: 13px; opacity: 0.6; text-align: center; max-width: 380px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="logo">Present<span>Flow</span></div>
  <div class="spinner"></div>
  <div class="status" id="status">Connecting…</div>
  <script>
    // main.ts updates this text via executeJavaScript while it retries the
    // real app URL in the background — avoids the window sitting blank with
    // zero feedback on a slow/unreliable connection. Fully automatic, no
    // click needed.
    window.pfSetStatus = (text) => { document.getElementById("status").textContent = text; };
  </script>
</body>
</html>
