name: Release desktop app

# Fires when a version tag is pushed (e.g. `git tag v0.1.4 && git push --tags`).
# Builds the Electron shell on a macOS arm64 runner and publishes an unsigned
# .zip + latest-mac.yml to the GitHub Release for auto-updater delivery.
#
# Manual trigger also supported via workflow_dispatch — enter the version
# without the v prefix.
#
# The .app is the THIN CLIENT — no Next build, no bundled secrets. All the
# UI/API lives on Vercel and updates instantly on git push to main.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.4). Leave blank to reuse package.json version."
        required: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Sync version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Compile Electron main
        run: npm run electron:build:tsc

      - name: Build (no publish yet — need to ad-hoc sign first)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac zip --arm64 --publish never

      - name: Ad-hoc codesign the .app + repack zip
        # macOS Squirrel (electron-updater's mac install path) refuses to swap
        # in an *unsigned* update — the old app's install helper checks the
        # downloaded .app's signature and rejects anything without one. Since
        # we don't have an Apple Developer cert, apply an ad-hoc (identity="-")
        # signature: no notarization, no Gatekeeper trust, but valid enough
        # for Squirrel's SecCodeCheckValidity gate to pass.
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          APP="release/mac-arm64/Present Flow.app"
          ZIP="release/Present Flow-${VERSION}-arm64-mac.zip"
          BLOCKMAP="release/Present Flow-${VERSION}-arm64-mac.zip.blockmap"

          if [ ! -d "$APP" ]; then
            echo "::error::App bundle not found at $APP"
            ls -la release release/mac-arm64 || true
            exit 1
          fi

          echo "→ ad-hoc signing $APP"
          codesign --deep --force --sign - --timestamp=none "$APP"
          echo "→ verifying signature"
          codesign --verify --verbose=2 "$APP"

          echo "→ repacking zip"
          rm -f "$ZIP" "$BLOCKMAP"
          cd "release/mac-arm64"
          # ditto preserves resource forks + xattrs — required for macOS
          # to treat the extracted .app as valid.
          ditto -c -k --sequesterRsrc --keepParent "Present Flow.app" "../Present Flow-${VERSION}-arm64-mac.zip"
          cd -
          ls -lh "$ZIP"

      - name: Upload zip + generate + upload latest-mac.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          ZIP="release/Present Flow-${VERSION}-arm64-mac.zip"
          TAG="v${VERSION}"

          # Create GH Release if it doesn't exist (workflow_dispatch path).
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes

          # Upload the freshly-signed zip.
          gh release upload "$TAG" "$ZIP" --clobber

          # Reconstruct latest-mac.yml from the SIGNED zip (sha512 changed).
          SHA=$(shasum -a 512 "$ZIP" | awk '{print $1}' | xxd -r -p | base64)
          SIZE=$(stat -f%z "$ZIP")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          cat > release/latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: Present-Flow-${VERSION}-arm64-mac.zip
              sha512: ${SHA}
              size: ${SIZE}
          path: Present-Flow-${VERSION}-arm64-mac.zip
          sha512: ${SHA}
          releaseDate: '${DATE}'
          EOF
          gh release upload "$TAG" release/latest-mac.yml --clobber

